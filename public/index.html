<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montpellier Mobilité Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <button id="burger-btn" onclick="toggleMenu()">☰</button>

<div id="side-menu">
    <div class="menu-header">
        <h3>Mobilité Montpellier</h3>
        <button class="close-btn" onclick="toggleMenu()">×</button>
    </div>
    <div class="menu-content">
        <p>Afficher sur la carte :</p>
        <button class="menu-btn tram-btn active" onclick="setMode('trams', this)">🚋 Trams</button>
        <button class="menu-btn velo-btn" onclick="setMode('velos', this)">🚲 Vélos</button>
        <button class="menu-btn parking-btn" onclick="setMode('parkings', this)">🅿️ Parkings</button>
        <button class="menu-btn stationnement-btn" onclick="setMode('stationnement', this)">🚘 Stationnement (Rue)</button>
    </div>
</div>

<div id="menu-overlay" onclick="toggleMenu()"></div>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="Rechercher un arrêt de tram..." oninput="filterSearch()">
        <ul id="search-results"></ul>
    </div>

    <div id="controls">
        <button id="bug-btn" onclick="reportBug()"> Bug :( </button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ewoken/Leaflet.MovingMarker@master/MovingMarker.js"></script>
    <script src="https://infotram.tmaxmls.ovh/socket.io/socket.io.js"></script>
    <script type="module" src="/js/main.js"></script>

</body>
</html>
